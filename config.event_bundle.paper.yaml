api:
  polymarket_public_url: "https://gateway.polymarket.us"
  polymarket_private_url: "https://api.polymarket.us"
  polymarket_markets_ws_url: "wss://api.polymarket.us/v1/ws/markets"
  polymarket_private_ws_url: "wss://api.polymarket.us/v1/ws/private"
  kalshi_api_url: "https://api.elections.kalshi.com/trade-api/v2"
  key_id: "YOUR_POLYMARKET_KEY_ID_HERE"
  secret_key: "YOUR_POLYMARKET_SECRET_KEY_HERE"
  use_websocket: true
  use_rest_fallback: true
  timeout_seconds: 30
  max_retries: 3
  retry_delay_seconds: 1

trading:
  markets: []
  min_edge: 0.01
  bundle_arb_enabled: false
  event_bundle_arb_enabled: true
  mm_enabled: false
  taker_enabled: false
  min_spread: 0.05
  tick_size: 0.01
  default_order_size: 2
  min_order_size: 1
  max_order_size: 2
  slippage_tolerance: 0.02
  order_timeout_seconds: 45
  fee_mode: "polymarket_us"
  maker_fee_bps: -125
  taker_fee_bps: 500
  fee_theta_taker: 0.05
  fee_theta_maker: -0.0125

risk:
  max_position_per_market: 10
  max_global_exposure: 30
  max_daily_loss: 5
  max_drawdown_pct: 0.10
  trade_only_high_volume: false
  min_24h_volume: 0
  whitelist: []
  blacklist: []
  kill_switch_enabled: true
  auto_unwind_on_breach: true
  exchange_health_gate_enabled: true
  exchange_health_grace_seconds: 20
  max_private_ws_silence_seconds: 45
  max_markets_ws_silence_seconds: 60
  max_markets_rest_fallback_seconds: 45
  max_backpressure_events: 3
  allow_reduce_only_on_exchange_degradation: true

mode:
  trading_mode: "dry_run"
  data_mode: "real"
  cross_platform_enabled: false
  kalshi_enabled: false
  dry_run_initial_balance: 100
  simulate_fills: true
  fill_probability: 0.2

logging:
  console_level: "INFO"
  file_level: "DEBUG"
  log_dir: "logs"
  main_log_file: "bot.log"
  trades_log_file: "~/.polymarket-arbitrage/trades/trades.jsonl"
  opportunities_log_file: "opportunities.log"
  max_log_size_mb: 50
  backup_count: 5

monitoring:
  snapshot_interval: 60
  heartbeat_interval: 30
  track_latency: true
  track_fill_rates: true
  orderbook_active_batch_size: 300
  orderbook_request_batch_size: 20
  orderbook_fetch_concurrency: 16
  orderbook_request_delay_seconds: 0.0
  orderbook_batch_delay_seconds: 0.12
  orderbook_rotation_delay_seconds: 1.0
  websocket_reconnect_delay_seconds: 1.5

cache:
  enabled: true
  backend: "redis"
  redis_url: "redis://localhost:6379/0"
  key_prefix: "pmarb"
  connect_timeout_seconds: 1.0
  op_timeout_seconds: 0.5
  markets_ttl_seconds: 900
  matches_ttl_seconds: 3600
